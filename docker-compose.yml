services:
  worker:
    build: .
    environment:
      - WORKER_TOKEN=${WORKER_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - REDIS_URL=redis://redis:6379
      - SERVICE_FQDN_WORKER_3000
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
