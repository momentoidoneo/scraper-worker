services:
  worker:
    build: .
    ports:
      - "3030:3000"
    environment:
      - PORT=3000
      - WORKER_TOKEN=${WORKER_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - PROXY_URL=${PROXY_URL}
      - PROXY_USERNAME=${PROXY_USERNAME}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
      - REDIS_URL=redis://redis:6379
      - LISTING_CLASSIFIER_ENABLED=${LISTING_CLASSIFIER_ENABLED:-true}
      - OLLAMA_URL=${OLLAMA_URL:-http://172.17.0.1:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      - PRIVATE_DETAIL_ENRICHMENT_ENABLED=${PRIVATE_DETAIL_ENRICHMENT_ENABLED:-true}
      - PRIVATE_DETAIL_ENRICHMENT_MAX_RESULTS=${PRIVATE_DETAIL_ENRICHMENT_MAX_RESULTS:-60}
      - PARTICULAR_CANDIDATES_ENABLED=${PARTICULAR_CANDIDATES_ENABLED:-true}
      - PARTICULAR_CANDIDATE_MIN_CONFIDENCE=${PARTICULAR_CANDIDATE_MIN_CONFIDENCE:-0.5}
      - APIFY_IDEALISTA_DESIRED_RESULTS=${APIFY_IDEALISTA_DESIRED_RESULTS:-100}
      - APIFY_IDEALISTA_SEGMENTED_SEARCH=${APIFY_IDEALISTA_SEGMENTED_SEARCH:-true}
      - FOTOCASA_SEGMENTED_SEARCH=${FOTOCASA_SEGMENTED_SEARCH:-true}
      - FOTOCASA_MAX_SCROLLS=${FOTOCASA_MAX_SCROLLS:-26}
      - FOTOCASA_MAX_RESULTS=${FOTOCASA_MAX_RESULTS:-160}
      - HABITACLIA_MAX_PAGES=${HABITACLIA_MAX_PAGES:-8}
      - HABITACLIA_MAX_RESULTS=${HABITACLIA_MAX_RESULTS:-120}
      - HABITACLIA_PRIVATE_MAX_PAGES=${HABITACLIA_PRIVATE_MAX_PAGES:-16}
      - HABITACLIA_PRIVATE_MAX_RESULTS=${HABITACLIA_PRIVATE_MAX_RESULTS:-220}
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
