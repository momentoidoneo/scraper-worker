services:
  worker:
    build: .
    ports:
      - "3030:3000"
    environment:
      - PORT=3000
      - WORKER_TOKEN=${WORKER_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - PROXY_URL=${PROXY_URL}
      - PROXY_USERNAME=${PROXY_USERNAME}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
      - REDIS_URL=redis://redis:6379
      - LISTING_CLASSIFIER_ENABLED=${LISTING_CLASSIFIER_ENABLED:-true}
      - OLLAMA_URL=${OLLAMA_URL:-http://172.17.0.1:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      - APIFY_IDEALISTA_DESIRED_RESULTS=${APIFY_IDEALISTA_DESIRED_RESULTS:-100}
      - FOTOCASA_MAX_SCROLLS=${FOTOCASA_MAX_SCROLLS:-14}
      - FOTOCASA_MAX_RESULTS=${FOTOCASA_MAX_RESULTS:-80}
      - HABITACLIA_MAX_PAGES=${HABITACLIA_MAX_PAGES:-5}
      - HABITACLIA_MAX_RESULTS=${HABITACLIA_MAX_RESULTS:-90}
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
